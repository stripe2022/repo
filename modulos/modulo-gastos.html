<div class="modulo-gastos">

  <h2>Gastos</h2>

  <div class="campo">
    <label for="conceptoGasto">Concepto</label>
    <input id="conceptoGasto" type="text" placeholder="Ej: Transporte">
  </div>

  <div class="campo">
    <label for="montoGasto">Monto</label>
    <input
      id="montoGasto"
      type="text"
      placeholder="0"
      oninput="formatearNumero(this)"
    >
  </div>

  <div class="campo">
    <label for="descripcionGasto">Descripción opcional</label>
    <input id="descripcionGasto" type="text" placeholder="Detalle del gasto">
  </div>

  <div class="acciones-centro">
    <button type="button" onclick="agregarGasto()">
      Agregar gasto
    </button>
  </div>

  <hr>

  <table>
    <thead>
      <tr>
        <th>Concepto</th>
        <th>Monto</th>
        <th>Descripción</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaGastos"></tbody>
  </table>

  <div class="resultados">
    <p>
      Total gastos:
      <strong id="totalGastos">0.00</strong>
    </p>
  </div>

  <div class="acciones">
    <button type="button" onclick="siguiente('contenedor-cobros', 2)">
      ← Atrás
    </button>

    <button type="button" onclick="siguiente('contenedor-salarios', 4)">
      Siguiente →
    </button>
  </div>

</div>
